name: Build App
on: 
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        architecture: 'x64'
    - run: |
      pip install requirements.txt
      build-windows.bat
    - uses: actions/upload-artifact@v3
      with:
        name: editor-windows
        path: dist/WiiMusicEditorPlus-Windows.zip